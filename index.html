<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>System Alert</title>

<style>

body{
    margin:0;
    background:black;
    color:#00ff88;
    font-family:Consolas, monospace;
    overflow:hidden;
}

/* START SCREEN */

#startScreen{
    position:fixed;
    inset:0;
    background:black;
    display:flex;
    justify-content:center;
    align-items:center;
    z-index:9999;
}

#startBtn{
    padding:20px 40px;
    font-size:24px;
    background:#00ff88;
    border:none;
    border-radius:15px;
    cursor:pointer;
}

/* TERMINAL */

#terminal{
    padding:30px;
    font-size:clamp(16px,3vw,28px);
    white-space:pre-wrap;
    line-height:1.7;
}

/* POPUP */

.popup{
    position:fixed;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    width:min(90vw,700px);
    background:#111;
    border:2px solid #00ff88;
    padding:30px;
    border-radius:20px;
    box-shadow:0 0 30px rgba(0,255,136,0.5);
    z-index:999;
    display:none;
}

.popup-title{
    font-size:20px;
    margin-bottom:20px;
    color:#00ff88;
}

.popup-message{
    font-size:clamp(16px,2.8vw,28px);
    line-height:1.7;
}

.popup button{
    margin-top:25px;
    padding:12px 30px;
    font-size:18px;
    background:#00ff88;
    border:none;
    border-radius:10px;
}

.fade{
    animation:fadein .5s;
}

@keyframes fadein{
    from{
        opacity:0;
        transform:translate(-50%,-45%);
    }
    to{
        opacity:1;
        transform:translate(-50%,-50%);
    }
}

</style>
</head>

<body>

<div id="startScreen">
    <button id="startBtn">Tap to Start</button>
</div>

<div id="terminal"></div>

<div class="popup" id="popup">
    <div class="popup-title" id="popupTitle"></div>
    <div class="popup-message" id="popupMessage"></div>
    <button onclick="nextPopup()">OK</button>
</div>

<audio id="bgMusic" loop>
    <source src="music.mp3" type="audio/mpeg">
</audio>

<script>

const terminal = document.getElementById("terminal");

const introLines = [
    "Initializing system emotions...",
    "Loading unresolved feelings...",
    "Opening hidden thoughts..."
];

const popups = [

{
title:"System Warning",
msg:"tanong ko lang... kapag ba naliligaw ka tama bang magpatuloy ka lang maglakad kasi baka malapit na ka na? O dapat nang umatras habang maaga pa?"
},

{
title:"System Update",
msg:"Depende. May nakikita ka bang direksyon o puro kalituhan lang ang kaharap mo?"
},

{
title:"System Update",
msg:"Eto kasi... parang nasa gitna ako ng kalsada. Hindi ko alam kung saan ang dulo pero pag lumingon ako sa likod ko ang layo na ng nilakad ko. Sayang naman kung titigil ako di ba?"
},

{
title:"Opening System Files",
msg:" Oo, nakakapag-isip talaga yan. Pero alam mo, ang tunay na sayang ay yung oras na ginugol mo sa bagay na hindi ka naman sigurado kung may patutunguhan. Parang naghihintay ka ng jeep na wala namang nakalagay na destinasyon nakakapagod lang ang pag-aabang."
},

{
title:"Downloading System Files",
msg:" Pero minsan naman, masaya eh. Parang kape—matapang, mainit, at nakakapagpagising. Kaso... madalas naman akong mapapaso o di kaya nawalan ng lasa."
},

{
title:"Deleting System Files",
msg:"Ah, ganun ba? Tandaan mo, ang magandang kape, ninanamnam. Ang mapait, ibinubuga. Huwag mong pilitin ang sarili mo na uminom kung alam mong masasaktan lang ang tiyan mo sa huli. Ang relasyon, hindi dapat laging puro paghula kung tama ba o mali ang ginagawa niyo."
},

{
title:"Deleting System Files",
msg:"Ang hirap lang kasi magdesisyon. Kung itutuloy ko ba o bibitaw na."
},
{
title:"Final Warning",
msg:"Alam mo, hindi masamang sumubok. Pero hindi rin masamang tumigil para huminga. Ang tanong ko lang sa’yo: Kapag iniisip mo ang bukas kasama siya, nakangiti ka ba... o napapabuntong-hininga ka na agad bago pa sumapit ang araw na ‘yon?"
}

];

let popupIndex = 0;

function sleep(ms){
    return new Promise(resolve => setTimeout(resolve, ms));
}

async function typeLine(text, speed=50){

    for(let i=0;i<text.length;i++){
        terminal.innerHTML += text.charAt(i);
        await sleep(speed);
    }

    terminal.innerHTML += "\n";
}

async function startExperience(){

    document.getElementById("startScreen").style.display="none";

    document.getElementById("bgMusic").play();

    for(let line of introLines){
        await typeLine(line,60);
        await sleep(800);
    }

    await sleep(1000);

    showPopup();
}

function showPopup(){

    const popup = document.getElementById("popup");

    document.getElementById("popupTitle").innerText =
        popups[popupIndex].title;

    document.getElementById("popupMessage").innerText =
        popups[popupIndex].msg;

    popup.style.display = "block";
    popup.classList.add("fade");
}

function nextPopup(){

    popupIndex++;

    if(popupIndex >= popups.length){

        document.getElementById("popup").style.display="none";

        ending();

        return;
    }

    showPopup();
}

async function ending(){

    await sleep(500);

    await typeLine("",20);
    await typeLine("System shutting down emotions...",70);

    setTimeout(()=>{
        document.body.innerHTML =
        "<div style='display:flex;justify-content:center;align-items:center;height:100vh;font-size:40px;color:#00ff88;'>End of transmission.</div>";
    },3000);
}

document.getElementById("startBtn")
.addEventListener("click",startExperience);

</script>

</body>
</html>
